<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>列表页模板 · 万邦速达</title>
  <link rel="stylesheet" href="prototype-shell.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f2f3f5;
      --line: #dcdfe6;
      --text: #2f3542;
      --muted: #7f8796;
      --purple: #7d5bc9;
    }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .main-area {
      flex: 1;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: #fff;
    }
    .page {
      flex: 1;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: auto;
      background: #fff;
    }
    .query-section {
      flex-shrink: 0;
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    .query-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px 16px;
    }
    .query-grid input,
    .query-grid select {
      width: 100%;
      height: 36px;
      border: 1px solid #cfd5df;
      border-radius: 4px;
      padding: 0 10px;
      font-size: 13px;
      color: #4f5664;
      background: #fff;
      outline: none;
      font-family: inherit;
    }
    .query-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-query {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-width: 72px;
      height: 32px;
      padding: 0 18px;
      background: var(--purple);
      border: 1px solid var(--purple);
      color: #fff;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
    }
    .table-area {
      flex: 1;
      min-height: 0;
      padding: 12px 16px 16px;
      overflow: hidden;
      background: #fff;
    }
    .data-table-wrap {
      width: 100%;
      height: 100%;
      overflow: auto;
      border: 1px solid var(--line);
      background: #fff;
    }
    .data-table {
      width: 100%;
      min-width: 960px;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 12px;
    }
    .data-table th,
    .data-table td {
      border: 1px solid var(--line);
      padding: 10px 12px;
      text-align: left;
      white-space: nowrap;
      color: #4f5664;
    }
    .data-table th {
      background: #f0f2f5;
      color: #303848;
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 2;
    }
  </style>
</head>
<body>
  <script>
    window.__PROTOTYPE_SHELL__ = {
      topbarActive: "排舱",
      sidebarActiveL1: "账单管理",
      sidebarActiveL2: "空运索赔",
      sidebarFromProductRoot: "../",
    };
  </script>
  <div id="prototype-shell-topbar"></div>
  <div class="app-layout">
    <div id="prototype-shell-sidebar"></div>
    <main class="main-area">
      <div class="page">
        <div class="page-head">
          <div class="header">
            <div class="header-title">列表页标题</div>
            <div class="header-actions">
              <a class="header-link" href="javascript:void(0)">导出</a>
              <a class="header-link" href="javascript:void(0)">新增</a>
            </div>
          </div>
        </div>

        <div class="tabs-bar">
          <button class="tab-btn is-active" type="button" data-tab="all">全部</button>
          <button class="tab-btn" type="button" data-tab="pending">处理中</button>
          <button class="tab-btn" type="button" data-tab="done">已完成</button>
        </div>

        <div class="tab-panels">
          <section class="tab-panel is-active" data-panel="all">
            <div class="query-section">
              <div class="query-grid">
                <input type="text" placeholder="编号" />
                <input type="text" placeholder="关键字" />
                <select><option>状态</option></select>
                <div class="query-actions">
                  <button class="btn-query" type="button">查询</button>
                </div>
              </div>
            </div>
            <div class="table-area">
              <div class="data-table-wrap">
                <table class="data-table">
                  <thead>
                    <tr>
                      <th>序号</th>
                      <th>编号</th>
                      <th>名称</th>
                      <th>状态</th>
                      <th>更新时间</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td>01</td>
                      <td>NO20260402001</td>
                      <td>示例数据</td>
                      <td>处理中</td>
                      <td>2026-04-02 10:00</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </section>

          <section class="tab-panel" data-panel="pending"></section>
          <section class="tab-panel" data-panel="done"></section>
        </div>
      </div>
    </main>
  </div>
  <script src="prototype-shell.js"></script>
  <script>
    (function () {
      var tabButtons = document.querySelectorAll(".tab-btn");
      var tabPanels = document.querySelectorAll(".tab-panel");

      tabButtons.forEach(function (button) {
        button.addEventListener("click", function () {
          var tab = button.getAttribute("data-tab");
          tabButtons.forEach(function (item) {
            item.classList.toggle("is-active", item === button);
          });
          tabPanels.forEach(function (panel) {
            panel.classList.toggle("is-active", panel.getAttribute("data-panel") === tab);
          });
        });
      });
    })();
  </script>
</body>
</html>
